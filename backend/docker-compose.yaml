services:
  turf-backend:
    build: .
    container_name: turf-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - turf-mongo
      - turf-redis
    volumes:
      - .:/app
    command: gunicorn --reload --reload-engine=poll --workers 2 --threads 4 --bind 0.0.0.0:8000 --timeout 60 --access-logfile - --error-logfile - --log-level debug app:flask_app

  turf-mongo:
    hostname: turf-mongo
    image: mongo:6.0
    restart: always
    container_name: turf-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    # environment:
    #   - MONGO_INITDB_ROOT_USERNAME=root
    #   - MONGO_INITDB_ROOT_PASSWORD=secret
    # command: ["mongod", "--bind_ip_all"]

  turf-redis:
    image: redis:7
    container_name: turf-redis
    ports:
    - "6379:6379"
    # no ports

  jenkins:
    image: jenkins/jenkins:lts
    container_name: turf-jenkins
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  mongo_data:
  jenkins_home:
