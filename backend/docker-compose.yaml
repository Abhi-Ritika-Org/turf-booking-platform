services:
  turf-backend:
    build: .
    container_name: turf-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - turf-mongo
      - turf-redis
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
  turf-mongo:
    image: mongo:7
    container_name: turf-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  turf-redis:
    image: redis:7
    container_name: turf-redis
    # no ports

volumes:
  mongo_data:
