services:
  backend:
    container_name: backend
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
    restart: always
    depends_on:
      - redis

  redis:
    container_name: redis
    image: redis:latest
    restart: always
