services:
  turf-backend:
    build: .
    container_name: turf-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - turf-mongo
      - turf-redis
    volumes:
      - .:/app
    command: gunicorn --workers 2 --threads 4 --bind 0.0.0.0:8000 --timeout 60 app:flask_app

  turf-mongo:
    hostname: turf-mongo
    image: mongo:6.0
    restart: always
    container_name: turf-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    # environment:
    #   - MONGO_INITDB_ROOT_USERNAME=root
    #   - MONGO_INITDB_ROOT_PASSWORD=secret
    # command: ["mongod", "--bind_ip_all"]

  turf-redis:
    image: redis:7
    container_name: turf-redis
    ports:
    - "6379:6379"
    # no ports

volumes:
  mongo_data:
